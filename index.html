  <style>
    /* Elimina cualquier margen/padding que pueda generar texto o espacios no deseados */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: transparent;
      line-height: 0;          /* Evita espacios extra causados por líneas vacías */
    }
    /* Los contenedores mantienen su propio estilo; sin texto añadido */
    div[id^="ad-"] {
      display: block;
    }
  </style>
</head>

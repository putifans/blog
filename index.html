<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PutiFans - Free Crypto</title>
    
    <meta name="description" content="¡Multiplica tus ganancias hoy! 🚀 Descubre la selección definitiva de los mejores Faucets verificados para ganar criptomonedas gratis sin inversión. ¡Retiros instantáneos y pagos garantizados!">
    
    <link rel="icon" type="image/png" href="https://qu.ax/tD1Wu.png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "url": "https://tusitio.com", 
      "logo": "https://qu.ax/tD1Wu.png"
    }
    </script>

    <style>
        :root {
            --bg-color: #0b0e18;
            --card-bg: #161b2c;
            --primary-gradient: linear-gradient(90deg, #6366f1 0%, #d946ef 100%);
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --accent-yellow: #fbbf24;
            --logo-holder-bg: #000000; 
            --logo-border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 600px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: bold;
            font-size: 1.2rem;
        }

        /* Estilo para el nuevo logo del encabezado */
        .site-logo-img {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            object-fit: cover;
        }

        .menu-icon {
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 101;
        }

        .menu-icon span {
            width: 25px;
            height: 3px;
            background-color: white;
            border-radius: 2px;
            transition: 0.3s;
        }

        .menu-icon.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .menu-icon.open span:nth-child(2) { opacity: 0; }
        .menu-icon.open span:nth-child(3) { transform: rotate(-45deg) translate(7px, -6px); }

        .hero {
            text-align: center;
            padding: 20px;
            max-width: 500px;
        }

        .hero h1 {
            font-size: 2.3rem;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .hero h1 span {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            color: var(--text-dim);
            line-height: 1.6;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 15px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid #2d3748;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .card-logo-holder {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background-color: var(--logo-holder-bg);
            border: 1px solid var(--logo-border);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 6px;
            box-sizing: border-box;
            overflow: hidden;
        }

        .card-logo {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            display: block;
        }

        .card-title-group h2 { margin: 0; font-size: 1.3rem; }
        .card-title-group p { margin: 2px 0 0; color: var(--text-dim); font-size: 0.85rem; }

        .badge-group { margin-left: auto; display: flex; gap: 5px; align-self: flex-start; }
        .badge { font-size: 0.65rem; padding: 4px 7px; border-radius: 6px; font-weight: bold; text-transform: uppercase; }
        .badge-top { background: #f59e0b; color: #000; }
        .badge-hot { background: #ef4444; color: #fff; }

        .withdraw-info { color: var(--accent-yellow); font-weight: bold; margin-bottom: 12px; font-size: 0.95rem; }

        .promo-box {
            background: rgba(255,255,255,0.04);
            padding: 10px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .features { list-style: none; padding: 0; margin: 0 0 18px 0; }
        .features li { font-size: 0.85rem; color: var(--text-dim); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; }
        .features li::before { content: '✓'; color: #10b981; font-weight: bold; }

        .btn-earn {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            background: var(--primary-gradient);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1rem;
            transition: transform 0.2s;
            box-sizing: border-box;
        }

        .btn-earn:active { transform: scale(0.98); }

        #menu {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(7, 9, 15, 0.98);
            z-index: 100;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 25px;
            backdrop-filter: blur(10px);
        }

        #menu a {
            color: white;
            text-decoration: none;
            font-size: 1.3rem;
            padding: 12px 24px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            width: 220px;
            text-align: center;
        }

        #menu a.back-btn { background: var(--primary-gradient); border: none; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <img src="https://qu.ax/tD1Wu.png" alt="FaucetDashboard Logo" class="site-logo-img">
            PutiFans
        </div>
        <div class="menu-icon" id="menu-icon" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </header>

    <div id="menu">
        <a href="https://t.me/picante_biz" target="_blank">Mi Telegram</a>
        <a href="#" class="back-btn" onclick="toggleMenu()">Volver al Menú</a>
    </div>

    <div class="hero">
        <h1>Top Platforms to Get <span>Free Crypto & Money</span></h1>
        <p>Encuentra las plataformas verificadas para recolectar criptomonedas gratis y efectivo real todos los días.</p>
    </div>

    <div class="container" id="cards-container"></div>

    <script>
        const platforms = [
            { name: "VieFaucet", logo: "https://qu.ax/Fn8wV.png", link: "https://viefaucet.com?r=67f3d36764c6bc92ad63b030" },
            { name: "Dogepick", logo: "https://qu.ax/BWLKa.png", link: "https://dogepick.io/?ref=josmart" },
            { name: "Litepick", logo: "https://qu.ax/qhyaV.png", link: "https://litepick.io/?ref=josmart" },
            { name: "Solpick", logo: "https://qu.ax/9k6d0.png", link: "https://solpick.io/?ref=josmart" },
            { name: "Bnbpick", logo: "https://qu.ax/Rb6la.png", link: "https://bnbpick.io/?ref=Cheyomart" },
            { name: "Tonpick", logo: "https://qu.ax/JviMG.png", link: "https://tonpick.game/?ref=josmart" },
            { name: "Polpick", logo: "https://qu.ax/fFBRa.png", link: "https://polpick.io/?ref=josmart" },
            { name: "Tronpick", logo: "https://qu.ax/51EY2.png", link: "https://tronpick.io/?ref=JossMartinez" },
            { name: "Freetron", logo: "https://qu.ax/uRW3B.webp", link: "https://freetron.in?ref=prooN47BgV" },
            { name: "Freebch", logo: "https://qu.ax/yjvXI.webp", link: "https://freebch.in?ref=E_LS2o8yuo" },
            { name: "Freexrp", logo: "https://qu.ax/dAeua.svg", link: "https://freexrp.in?ref=nzLloa_o42" },
            { name: "Freearb", logo: "https://qu.ax/eGNGf.webp", link: "https://freearb.in?ref=Bc2EqVcWUf" },
            { name: "Ltckong", logo: "https://qu.ax/4rKSI.jpg", link: "https://ltckong.live/?ref=JosMart" },
            { name: "Tonkong", logo: "https://qu.ax/ytsIU.jpg", link: "https://tonkong.live/?ref=google_1141043065" },
            { name: "Bnbkong", logo: "https://qu.ax/NV5oz.jpg", link: "https://bnbkong.live/?ref=JosMart" },
            { name: "Tronkong", logo: "https://qu.ax/lJCB8.jpg", link: "https://tronkong.live/?ref=JosMart" },
            { name: "Starlavinia", logo: "https://qu.ax/gDBQR.webp", link: "https://starlavinia.com?ref=33105" }
        ];

        const container = document.getElementById('cards-container');

        platforms.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-logo-holder">
                        <img src="${p.logo}" class="card-logo" alt="${p.name}">
                    </div>
                    <div class="card-title-group">
                        <h2>${p.name}</h2>
                        <p>Gana Cripto</p>
                    </div>
                    <div class="badge-group">
                        <span class="badge badge-top">TOP</span>
                        <span class="badge badge-hot">HOT</span>
                    </div>
                </div>
                <div class="withdraw-info">Retiro instantáneo a tu billetera</div>
                <div class="promo-box">
                    <span>🎁</span> Dinero real sin inversión
                </div>
                <ul class="features">
                    <li>Faucets y tareas de alto pago</li>
                    <li>Retiros garantizados</li>
                </ul>
                <a href="${p.link}" target="_blank" class="btn-earn">Gana ahora ➔</a>
            `;
            container.appendChild(card);
        });

        function toggleMenu() {
            const menu = document.getElementById('menu');
            const menuIcon = document.getElementById('menu-icon');
            const isOpen = menu.style.display === 'flex';
            menu.style.display = isOpen ? 'none' : 'flex';
            menuIcon.classList.toggle('open', !isOpen);
        }
    </script>
</body>
</html>
